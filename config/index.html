<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>WristAgent Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: #f0f0f0; padding: 24px 16px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 8px; color: #f0f0f0; font-size: 15px; margin-bottom: 24px; }
    button { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px;
             font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
    #saveBtn { background: #4a90d9; color: #fff; }
    #cancelBtn { background: #2a2a2a; color: #aaa; border: 1px solid #444; }
    #status { font-size: 14px; color: #4a90d9; margin-top: 16px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>WristAgent</h1>
  <p id="hint">OpenAI API設定</p>

  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">

  <button id="saveBtn" onclick="doSave()">保存</button>
  <button id="cancelBtn" onclick="doCancel()">キャンセル</button>

  <div id="status"></div>

  <script>
    function getParam(name) {
      var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return m ? decodeURIComponent(m[1]) : '';
    }

    var current = getParam('current');
    if (current) {
      document.getElementById('hint').textContent = '設定済み: ' + current;
    }

    function doSave() {
      var key = document.getElementById('apiKey').value.trim();
      if (!key) { alert('APIキーを入力してください'); return; }
      // URLハッシュにデータをセット → 戻るボタンで閉じると e.response に渡される
      location.hash = encodeURIComponent(JSON.stringify({ apiKey: key }));
      document.getElementById('status').textContent = '保存しました。戻るボタンで閉じてください。';
      document.getElementById('saveBtn').disabled = true;
    }

    function doCancel() {
      location.hash = encodeURIComponent(JSON.stringify({ cancelled: true }));
      history.back();
    }
  </script>
</body>
</html>
